---
controllers:
  main:
    pod:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
    containers:
      main:
        image:
          # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
          tag: v2.7.5
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1000
        env:
          TZ: America/Los_Angeles
          REDIS_HOSTNAME: dragonfly.database.svc.cluster.local
          DB_HOSTNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-secret
                key: DB_HOSTNAME
          DB_PORT:
            valueFrom:
              secretKeyRef:
                name: immich-db-secret
                key: DB_PORT
          DB_DATABASE_NAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-secret
                key: DB_DATABASE_NAME
          DB_USERNAME:
            valueFrom:
              secretKeyRef:
                name: immich-db-secret
                key: DB_USERNAME
          DB_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: immich-db-secret
                key: DB_PASSWORD
          DB_VECTOR_EXTENSION: pgvector
immich:
  metrics:
    enabled: true
  persistence:
    library:
      existingClaim: immich-library
  machine-learning:
    enabled: true
    controllers:
      main:
        pod:
          securityContext:
            seccompProfile:
              type: RuntimeDefault
        containers:
          main:
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              runAsNonRoot: true
              runAsUser: 1000
valkey:
  enabled: false
