map $http_upgrade $connection_upgrade {

    default upgrade;
    ''      close;
}
server {
    listen {{ livekit_jwt_proxy_port }} ssl;
    server_name {{ livekit_config['turn']['domain'] }};

    ssl_certificate {{ livekit_config['turn']['cert_file'] }};
    ssl_certificate_key {{ livekit_config['turn']['key_file'] }};


    # for lk-jwt-service
    location ~ ^/(sfu/get|healthz|get_token) {
        proxy_pass http://127.0.0.1:{{ livekit_jwt_port }}$request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_buffering off;
    }

    # for livekit
    location / {
        proxy_pass http://127.0.0.1:{{ livekit_config['port'] }}$request_uri;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Host $http_host;
        proxy_buffering off;

        # websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    # send logs to journald
    access_log syslog:server=unix:/dev/log main;
    error_log syslog:server=unix:/dev/log;
}
